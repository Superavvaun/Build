# Build APK for Kiwi Browser (ARM64 Only - Fixed Version)
name: build

on:
  workflow_dispatch:
    inputs:
      prepareRelease:
        description: 'Create a draft release'     
        required: true
        default: 'no'

jobs:
  build:
    runs-on: ubuntu-latest # Sudah diupdate dari 20.04

    strategy:
      fail-fast: false
      matrix:
        platform: [arm64]

    steps:
      - name: Initializing build
        run: echo Initializing build for platform ${{ matrix.platform }}

      - name: Reclaiming disk space
        run: |
          sudo swapoff -av
          sudo rm -f /swapfile
          sudo rm -rf /usr/share/dotnet /imagegeneration

      - name: Checking-out source-code
        uses: actions/checkout@v4 # Update ke v4

      - name: Creating secondary disk folder
        run: |
          sudo mkdir -p /extended_data
          sudo chown -R runner:docker /extended_data
      
      - name: Link SSD
        run: |
          sudo ln -s /extended_data /mnt/secondary_disk
          sudo ln -s /mnt/secondary_disk $GITHUB_WORKSPACE/

      - name: Checking-out CIPD dependencies
        uses: actions/checkout@v4 # Update ke v4
        with:
          repository: kiwibrowser/dependencies
          path: ./secondary_disk/.cipd 

      - name: Linking .cipd and copying .gclient
        run: |
          ln -s $GITHUB_WORKSPACE/./secondary_disk/.cipd ..
          cp ../.cipd/.gclient ..
          cp ../.cipd/.gclient_entries ..

      - name: Installing system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python openjdk-8-jdk-headless libncurses5 ccache ninja-build
          sudo bash install-build-deps.sh --no-chromeos-fonts

      - name: Generating build files
        run: |
          mkdir -p secondary_disk/out/android_${{ matrix.platform }}
          cat .build/android_arm/args.gn | sed "s#target_cpu = \"arm\"#target_cpu = \"${{ matrix.platform }}\"#" > secondary_disk/out/android_${{ matrix.platform }}/args.gn
          # Tambahkan git clone depot_tools di sini jika script membutuhkannya

      - name: Compiling source-code
        run: |
          # Perintah GN dan Ninja kamu di sini
          echo "Starting Ninja Build..."
          # ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome_public_apk

      - name: Uploading APK Artifact
        uses: actions/upload-artifact@v4 # Update ke v4 (SOLUSI ERROR TADI)
        with:
          name: apk-arm64
          path: ./secondary_disk/out/android_arm64/apks/

  sign_and_upload:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Downloading artifact (arm64)
        uses: actions/download-artifact@v4 # Update ke v4
        with:
          name: apk-arm64
          path: ./apk-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2 # Pakai versi baru
        with:
          tag_name: build-${{ github.run_id }}
          name: Aesthetic Browser v1
          files: ./apk-arm64/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
