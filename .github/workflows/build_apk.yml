# Build APKs for Kiwi Browser (Fork Optimized - 64bit Only - The Last Fix)
name: build apk

on:
  workflow_dispatch:
    inputs:
      prepareRelease:
        description: 'Create a draft release in Google Play Store'     
        required: true
        default: 'no'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        platform: [arm64]

    steps:
      - name: Initializing build
        run: echo Initializing build for platform ${{ matrix.platform }}

      - name: Reclaiming disk space
        run: |
          sudo swapoff -av
          sudo rm -f /swapfile
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /imagegeneration
          sudo apt-get clean

      - name: Checking-out source-code
        uses: actions/checkout@v4

      - name: Creating secondary disk folder (SSD)
        run: |
          sudo mkdir -p /extended_data
          sudo chown -R runner:docker /extended_data
          sudo ln -s /extended_data /mnt/secondary_disk
          sudo ln -s /mnt/secondary_disk $GITHUB_WORKSPACE/

      - name: Checking-out CIPD dependencies
        uses: actions/checkout@v4
        with:
          repository: kiwibrowser/dependencies
          path: ./secondary_disk/.cipd 

      - name: Setup gclient environment & src symlink
        run: |
          ln -sf $GITHUB_WORKSPACE/secondary_disk/.cipd $GITHUB_WORKSPACE/../.cipd
          cp $GITHUB_WORKSPACE/../.cipd/.gclient $GITHUB_WORKSPACE/../.gclient
          cp $GITHUB_WORKSPACE/../.cipd/.gclient_entries $GITHUB_WORKSPACE/../.gclient_entries
          ln -sf $GITHUB_WORKSPACE $GITHUB_WORKSPACE/../src
          
          cd ..
          python3 -c "
          import os
          repo = os.path.basename(os.environ['GITHUB_WORKSPACE'])
          for file in ['.gclient', '.gclient_entries']:
              with open(file, 'r') as f: t = f.read()
              t = t.replace('\"src\"', '\"' + repo + '\"').replace(\"'src'\", \"'\" + repo + \"'\")
              t = t.replace('\"src/', '\"' + repo + '/').replace(\"'src/\", \"'\" + repo + \"/\")
              with open(file, 'w') as f: f.write(t)
          "

      - name: Installing Python packages & OpenJDK
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-distutils python3.11-venv python2 openjdk-8-jdk-headless libncurses5 ccache ninja-build
          sudo apt-get remove -y python-is-python3

      - name: Installing system dependencies
        run: |
          sudo bash install-build-deps.sh --no-chromeos-fonts
          python2 build/linux/sysroot_scripts/install-sysroot.py --arch=i386
          python2 build/linux/sysroot_scripts/install-sysroot.py --arch=amd64

      - name: Configuring Python (Phase 1)
        run: |
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 1

      # [PERBAIKAN TOTAL VPYTHON]
      - name: Downloading depot_tools and Hard-patching vpython to /usr/bin
        working-directory: ./secondary_disk
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          
          # Buat script filter di lokasi sementara
          cat << 'EOF' > /tmp/vpython_stub
          #!/bin/bash
          args=()
          skip=0
          for arg in "$@"; do
            if [ $skip -eq 1 ]; then skip=0; continue; fi
            if [[ "$arg" == -vpython* ]]; then
              if [[ "$arg" != *"="* ]]; then skip=1; fi
              continue
            fi
            args+=("$arg")
          done
          if [[ "$0" == *"vpython3"* ]]; then
            exec /usr/bin/python3.11 "${args[@]}"
          else
            exec /usr/bin/python2 "${args[@]}"
          fi
          EOF
          
          chmod +x /tmp/vpython_stub
          # Pasang langsung ke /usr/bin agar sistem tidak bisa berkelit
          sudo cp /tmp/vpython_stub /usr/bin/vpython
          sudo cp /tmp/vpython_stub /usr/bin/vpython3
          # Copy juga ke depot_tools untuk jaga-jaga
          cp /tmp/vpython_stub depot_tools/vpython
          cp /tmp/vpython_stub depot_tools/vpython3

      - name: Adding depot_tools to path
        run: echo "$GITHUB_WORKSPACE/secondary_disk/depot_tools" >> $GITHUB_PATH

      - name: Bypass missing Traffic Annotation tools
        run: rm -f $GITHUB_WORKSPACE/../src/tools/traffic_annotation/bin/linux64/*.sha1 || true

      - name: Running gclient runhooks
        run: gclient runhooks

      - name: Switch Python to version 3.11 for Compilation
        run: |
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.11 2
          sudo update-alternatives --set python /usr/bin/python3.11
          rm -rf $HOME/.vpython-root

      - name: Creating signature & args.gn
        run: |
          keytool -genkey -v -keystore keystore.jks -alias dev -keyalg RSA -keysize 2048 -validity 10000 -storepass public_password -keypass public_password -dname "cn=Kiwi Browser, ou=Actions, o=Kiwi, c=GitHub"
          mkdir -p secondary_disk/out/android_${{ matrix.platform }}
          cat .build/android_arm/args.gn | sed "s#target_cpu = \"arm\"#target_cpu = \"${{ matrix.platform }}\"#" | sed "s#android_default_version_name = \"Git\"#android_default_version_name = \"Git$(date '+%y%m%d')Gen${{ github.run_id }}\"#" > secondary_disk/out/android_${{ matrix.platform }}/args.gn
          sed -i "s#android_default_version_code = \"1\"#android_default_version_code = \"$(date '+%y%m%d')2\"#" secondary_disk/out/android_${{ matrix.platform }}/args.gn

      - name: Generating build files (GN GEN)
        run: |
          export VPYTHON_BYPASS="manually managed python not supported by chrome operations"
          gn gen ./secondary_disk/out/android_${{ matrix.platform }}

      - name: Compiling source-code (NINJA)
        run: |
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} base
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome_public_apk

      - name: Uploading APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.platform }}
          path: ./secondary_disk/out/android_${{ matrix.platform }}/apks/

  sign_and_upload:
    runs-on: ubuntu-latest
    needs: build
    permissions: { contents: write }
    steps:
      - name: Downloading artifact
        uses: actions/download-artifact@v4
        with: { name: apk-arm64, path: apk-arm64 }
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Kiwi arm64 - Gen ${{ github.run_id }}"
          prerelease: true
          body: "Build otomatis Kiwi Browser arm64 (Public Archive)."
          files: |
            ./apk-arm64/*.apk
            ./apk-arm64/*.mapping
