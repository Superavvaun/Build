# Build APKs for Kiwi Browser (Fork Optimized - 64bit Only)
name: arm64

on:
  workflow_dispatch:
    inputs:
      prepareRelease:
        description: 'Create a draft release in Google Play Store'     
        required: true
        default: 'no'

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # HANYA BUILD 64-BIT (ARM64)
        platform: [arm64]

    steps:
      - name: Initializing build
        run: echo Initializing build for platform ${{ matrix.platform }}

      - name: Reclaiming disk space on / by disabling swap partition
        run: |
          sudo swapoff -av
          sudo rm -f /swapfile

      - name: Reclaiming HUGE disk space on / by removing unused GitHub dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /imagegeneration
          sudo apt-get clean

      - name: Checking-out source-code in $GITHUB_WORKSPACE
        uses: actions/checkout@v4

      - name: Creating secondary disk folder on /dev/disk/azure/resource-part1 (SSD)
        run: |
          sudo mkdir -p /extended_data
          sudo chown -R runner:docker /extended_data
      
      - name: On SSD - Creating symlink on /dev/disk/azure/root-part1 pointing to /dev/disk/azure/resource-part1
        run: |
          sudo ln -s /extended_data /mnt/secondary_disk
          sudo ln -s /mnt/secondary_disk $GITHUB_WORKSPACE/

      - name: Checking-out CIPD dependencies in /mnt/secondary_disk/.cipd
        uses: actions/checkout@v4
        with:
          repository: kiwibrowser/dependencies
          path: ./secondary_disk/.cipd 

      # MEMPERBAIKI .gclient DAN .gclient_entries SECARA MENYELURUH
      - name: Linking .cipd and fixing ALL gclient configs
        run: |
          ln -s $GITHUB_WORKSPACE/./secondary_disk/.cipd ..
          cp ../.cipd/.gclient ..
          cp ../.cipd/.gclient_entries ..
          
          cd ..
          python3 -c "
          import os
          repo = os.path.basename(os.environ['GITHUB_WORKSPACE'])
          for file in ['.gclient', '.gclient_entries']:
              with open(file, 'r') as f: t = f.read()
              # Mengganti semua referensi 'src' menjadi nama repositori kamu
              t = t.replace('\"src\"', '\"' + repo + '\"')
              t = t.replace(\"'src'\", \"'\" + repo + \"'\")
              t = t.replace('\"src/', '\"' + repo + '/')
              t = t.replace(\"'src/\", \"'\" + repo + \"/\")
              with open(file, 'w') as f: f.write(t)
          "
          echo "Konfigurasi gclient telah disinkronkan untuk repositori: $(basename $GITHUB_WORKSPACE)"

      # UPGRADE KE PYTHON 3.11 UNTUK DEPOT_TOOLS
      - name: Installing Python 3.11, Python 2, and OpenJDK
        run: |
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt-get update
          sudo apt-get install -y python3.11 python3.11-distutils python3.11-venv python2 openjdk-8-jdk-headless libncurses5 ccache ninja-build
          
          # Paksa sistem menggunakan Python 3.11 sebagai default
          sudo update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.11 1
          sudo update-alternatives --install /usr/bin/python python /usr/bin/python3.11 1
          python3 --version

      # MENGGUNAKAN PYTHON 2 KHUSUS UNTUK SCRIPT DEPENDENSI LAMA
      - name: Installing system dependencies
        run: |
          sudo bash install-build-deps.sh --no-chromeos-fonts
          python2 build/linux/sysroot_scripts/install-sysroot.py --arch=i386
          python2 build/linux/sysroot_scripts/install-sysroot.py --arch=amd64

      - name: Creating output folder
        run: mkdir -p secondary_disk/out/android_${{ matrix.platform }}

      - name: Generating one-time APK signature key
        run: keytool -genkey -v -keystore keystore.jks -alias dev -keyalg RSA -keysize 2048 -validity 10000 -storepass public_password -keypass public_password -dname "cn=Kiwi Browser (unverified), ou=Actions, o=Kiwi Browser, c=GitHub"

      - name: Copying args.gn to target folder
        run: cat .build/android_arm/args.gn | sed "s#target_cpu = \"arm\"#target_cpu = \"${{ matrix.platform }}\"#" | sed "s#android_default_version_name = \"Git\"#android_default_version_name = \"Git$(date '+%y%m%d')Gen${{ github.run_id }}\"#" > secondary_disk/out/android_${{ matrix.platform }}/args.gn

      - name: Modifying args.gn (arm64)
        run: sed -i "s#android_default_version_code = \"1\"#android_default_version_code = \"$(date '+%y%m%d')2\"#" secondary_disk/out/android_${{ matrix.platform }}/args.gn

      - name: Downloading depot_tools
        working-directory: ./secondary_disk
        run: git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

      - name: Adding depot_tools to path
        run: echo "$GITHUB_WORKSPACE/secondary_disk/depot_tools" >> $GITHUB_PATH

      - name: Setting environment variables
        run: |
          echo "CC=ccache clang -Qunused-arguments" >> $GITHUB_ENV
          echo "CXX=ccache clang++ -Qunused-arguments" >> $GITHUB_ENV

      # BYPASS RCLONE CACHE
      - name: Creating rclone config
        if: ${{ github.repository_owner == 'kiwibrowser' }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p $HOME/.config/rclone/
          echo '[cache]' > $HOME/.config/rclone/rclone.conf
          echo 'type = sftp' >> $HOME/.config/rclone/rclone.conf
          echo 'host = ${{ secrets.STORAGE_HOST }}' >> $HOME/.config/rclone/rclone.conf
          echo 'user = storage' >> $HOME/.config/rclone/rclone.conf
          echo 'key_pem = ${{ secrets.STORAGE_KEY }}' >> $HOME/.config/rclone/rclone.conf

      - name: Fetching number for the latest stable version of Chromium
        run: curl -s "https://omahaproxy.appspot.com/all" | grep -Fi "android,stable" | cut -f3 -d"," | awk '{split($0,a,"."); print "MAJOR=" a[1] "\nMINOR=" a[2] "\nBUILD=" a[3] "\nPATCH=" a[4]}' > chrome/VERSION

      # RUNHOOKS BERSIH (Tanpa Bypass) KARENA PYTHON 3.11 SUDAH TERINSTAL
      - name: Running gclient runhooks
        run: gclient runhooks

      - name: Generating build files
        run: gn gen ./secondary_disk/out/android_${{ matrix.platform }}

      # --- TAHAP KOMPILASI ---
      - name: Compiling source-code (base)
        run: ninja -C ./secondary_disk/out/android_${{ matrix.platform }} base

      - name: Compiling source-code (content/public)
        run: |
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} content/public/common
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} content/public/browser

      - name: Compiling source-code (components & gpu)
        run: |
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} components/guest_view/common
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} components/guest_view/renderer
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome/gpu
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} components/version_info

      - name: Compiling source-code (chrome_java & ui)
        run: |
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome_java
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} ui/base
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome/browser:resources
  
      - name: Compiling source-code (browser core)
        run: |
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome/browser/ui
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome/browser
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome/common
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome/renderer

      - name: Compiling source-code (extensions & services)
        run: |
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} extensions
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} services
          ninja -C ./secondary_disk/out/android_${{ matrix.platform }} v8

      - name: Checking available memory and listing processes
        run: |
          free -m
          ps auxww

      - name: Compiling source-code (FINAL APK)
        run: ninja -C ./secondary_disk/out/android_${{ matrix.platform }} chrome_public_apk

      - name: Generating native symbols mapping
        run: |
          mkdir -p ./secondary_disk/out/lnx64
          cp -v ../.cipd/tools/* ./secondary_disk/out/lnx64/
          chmod +x ./secondary_disk/out/lnx64/dump_syms
          python2 components/crash/content/tools/generate_breakpad_symbols.py --build-dir=./secondary_disk/out/lnx64 --symbols-dir=/tmp/extracted_symbols/ --binary=./secondary_disk/out/android_${{ matrix.platform }}/lib.unstripped/libchrome.so --clear --verbose
          tar -czvf ./secondary_disk/out/android_${{ matrix.platform }}/apks/ChromePublic.native.mapping.tar.gz /tmp/extracted_symbols

      - name: Uploading APK to Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.platform }}
          path: ./secondary_disk/out/android_${{ matrix.platform }}/apks/

  # JOB KEDUA: RILIS OTOMATIS
  sign_and_upload:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Downloading artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: apk-arm64
          path: apk-arm64

      - name: Create Release and Upload All Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_id }}
          name: "Kiwi Custom Build (arm64) - Gen ${{ github.run_id }}"
          draft: false
          prerelease: true
          body: |
            ## 🥝 Kiwi Browser - Custom Build (arm64)
            Versi ini dikompilasi secara otomatis untuk arsitektur `arm64-v8a`.
            
            ### ⚠️ DISCLAIMER PENTING
            * **Bukan Rilis Resmi:** Ini adalah modifikasi pribadi. Jangan laporkan *bug* ke pengembang resmi Kiwi Browser.
            * **Risiko Pengguna:** Disediakan "apa adanya". Semua risiko keamanan dan performa ditanggung pengguna.

            **Silakan unduh file `.apk` di bagian Assets di bawah untuk menginstal.**
          files: |
            ./apk-arm64/*.apk
            ./apk-arm64/*.mapping
            ./apk-arm64/*.tar.gz
